ospace" font-size="16">This profile provides context for UNSC, naval warfare, and campaign records across the Human-Covenant War and post-war periods.</text><text x="145" y="688" text-anchor="start" fill="#81b8c1" font-family="Consolas, monospace" font-size="16">Representative silhouettes are used here as orientation rather than exact class-by-class technical diagrams.</text>
