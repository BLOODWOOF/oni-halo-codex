    <text x="90" y="642" fill="#81b8c1" font-family="Consolas, monospace" font-size="16">ORION established the baseline; SPARTAN-II defined the elite model; SPARTAN-III broadened field numbers and mission sacrifice tolerance; SPARTAN-IV transitioned the program into the post-war UNSC framework.</text><text x="90" y="666" fill="#81b8c1" font-family="Consolas, monospace" font-size="16">Program records in this archive intersect with MJOLNIR development, naval special warfare doctrine, colonial defense, and post-war force restructuring.</text>
    
